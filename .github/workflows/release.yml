name: release-binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build archives
        run: |
          make release

      - name: Publish release assets
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            dist/*.tar.gz
            dist/*.zip
