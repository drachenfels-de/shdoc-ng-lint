name: release-docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        run: |
          registry="${GITHUB_SERVER_URL#https://}"
          registry="${registry#http://}"
          image="${registry}/${GITHUB_REPOSITORY_OWNER}/${GITHUB_REPOSITORY##*/}"
          {
            echo "registry=$registry"
            echo "image=$image"
            echo "tags<<EOF"
            echo "${image}:sha-${GITHUB_SHA}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${image}:main"
              echo "${image}:latest"
            fi
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${image}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to registry
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          echo "$GITEA_TOKEN" | docker login "${{ steps.meta.outputs.registry }}" -u "${GITHUB_ACTOR}" --password-stdin

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
